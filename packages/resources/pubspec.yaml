name: resources
description: Shared resources for the app including localization.
version: 1.0.0

environment:
  sdk: ">=3.10.4 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  intl_utils: ^2.8.7

flutter:
  uses-material-design: true

# Metadata for the IDE extension "Flutter Intl"
flutter_intl:
  enabled: true
  main_locale: vi
  arb_dir: lib/src/l10n
  output_dir: lib/src/generated
  class_name: S
